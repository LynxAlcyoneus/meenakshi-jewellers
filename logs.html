<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Logs</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; line-height: 1.5; }
    pre { background: #111; color: #f5f5f5; padding: 1rem; border-radius: 8px; overflow-x: auto; }
    .wrap { max-width: 900px; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Login Attempts</h1>
    <p>This page will show the most recent entries once the site is deployed on Netlify.</p>
    <pre id="logOutput">Loading...</pre>
  </div>
  <script>
    async function loadLogs() {
      try {
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const endpoint = isLocal ? '/api/login' : '/.netlify/functions/log-login';
        const response = await fetch(endpoint);
        if (!response.ok) throw new Error('Failed');
        const data = await response.json();
        document.getElementById('logOutput').textContent = data.logs || 'No logs yet.';
      } catch (err) {
        document.getElementById('logOutput').textContent = 'Logs are not available yet.';
      }
    }
    loadLogs();
  </script>
</body>
</html>
