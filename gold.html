<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gold Collection — Meenakshi Fine Jewellers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="gold">
  <div id="site-nav"></div>

  <section class="page-hero">
    <div class="container reveal-on-scroll">
      <p class="eyebrow">22K &amp; 18K · 916 BIS Hallmarked</p>
      <h1>The <span class="gold-text">Gold</span> Collection</h1>
      <p>Necklaces, chains, bangles, earrings and rings — each one weighed to the gram and certified for purity.</p>
    </div>
  </section>

  <section class="section" style="padding-top:2.5rem">
    <div class="container">
      <div class="toolbar reveal-on-scroll">
        <div class="search">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--muted)"><circle cx="8" cy="8" r="6"/><path d="M17 17l-4-4"/></svg>
          <input type="search" data-search placeholder="Search gold pieces…">
        </div>
        <div class="filters" data-filters></div>
      </div>
      <div class="grid" id="grid"></div>
    </div>
  </section>

  <div id="site-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => initCollection('gold', '#grid'));</script>
</body>
</html>
